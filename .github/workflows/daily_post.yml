name: Daily post to Telegram group

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot requests beautifulsoup4

      - name: Send daily post
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
        run: python daily_poster.py
